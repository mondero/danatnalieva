<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Для моей любимой художницы</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Контейнер под экран iPhone 16 Pro */
        .container {
            max-width: 430px;
            margin: 0 auto;
            padding: env(safe-area-inset-top) 20px 60px 20px;
        }

        /* Приятное появление при скролле */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.1rem; opacity: 0.7; }

        /* Галерея рисунков */
        .gallery-title { margin-top: 40px; margin-bottom: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .art-card {
            background: var(--glass);
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 3/4;
            cursor: pointer;
        }
        .art-card img { width: 100%; height: 100%; object-fit: cover; }

        /* БЛОК С КНОПКОЙ КОМПЛИМЕНТОВ */
        .compliment-box {
            margin-top: 80px;
            text-align: center;
            background: #161616;
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 77, 109, 0.2);
        }

        #compliment-text {
            font-size: 1.2rem;
            min-height: 3.6rem;
            margin-bottom: 25px;
            font-style: italic;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .heart-btn:active { transform: scale(0.9); }

        /* Модалка для фото */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center; align-items: center;
        }
        #modal img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header class="reveal">
        <h1>Для моей вдохновительницы ❤️</h1>
        <p>Ты создаешь миры на бумаге, а я создаю этот мир для тебя.</p>
    </header>

    <div class="gallery-title reveal">
        <h2>Твои шедевры</h2>
        <p>То, как ты видишь мир — это магия.</p>
    </div>

    <div class="grid">
        <!-- Замени art1.jpg и т.д. на свои файлы в папке -->
        <div class="art-card reveal" onclick="openFull(this)"><img src="art1.jpg" alt="Art 1"></div>
        <div class="art-card reveal" onclick="openFull(this)"><img src="art2.jpg" alt="Art 2"></div>
        <div class="art-card reveal" onclick="openFull(this)"><img src="art3.jpg" alt="Art 3"></div>
        <div class="art-card reveal" onclick="openFull(this)"><img src="art4.jpg" alt="Art 4"></div>
    </div>

    <!-- КНОПКА С КОМПЛИМЕНТАМИ -->
    <div class="compliment-box reveal">
        <div id="compliment-text">Нажми на сердечко, если станет грустно...</div>
        <button class="heart-btn" onclick="giveCompliment()">❤️</button>
    </div>

    <footer style="text-align: center; margin-top: 60px; opacity: 0.3; font-size: 0.8rem;">
        Made by Your Guy | 2026
    </footer>
</div>

<div id="modal" onclick="this.style.display='none'">
    <img id="modal-img" src="">
</div>

<script>
    // Массив комплиментов
    const compliments = [
        "Твои рисунки — мой любимый вид искусства",
        "Твоя улыбка освещает мой день ярче любого экрана",
        "Ты видишь красоту там, где другие её не замечают",
        "Твоя фантазия — это целый космос",
        "Я горжусь каждой твоей новой работой",
        "Ты — самое прекрасное, что я когда-либо встречал",
        "Твой смех — мой любимый саундтрек",
        "Обожаю твой стиль и то, как ты чувствуешь цвет",
        "Для меня ты — главная героиня самого крутого арта",
        "Сегодня идеальный день, чтобы сказать, как я тебя люблю"
    ];

    function giveCompliment() {
        const textElem = document.getElementById('compliment-text');
        const randomCompliment = compliments[Math.floor(Math.random() * compliments.length)];
        
        // Эффект плавного переключения текста
        textElem.style.opacity = 0;
        setTimeout(() => {
            textElem.innerText = randomCompliment;
            textElem.style.opacity = 1;
        }, 200);
    }

    function openFull(card) {
        const img = card.querySelector('img').src;
        document.getElementById('modal-img').src = img;
        document.getElementById('modal').style.display = 'flex';
    }

    // Скрипт для появления блоков при скролле
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
