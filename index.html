<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-color: #bb86fc; /* Нежно-фиолетовый, под арт-стиль */
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Адаптация под экран iPhone 16 Pro (вытянутый дисплей) */
        .container {
            max-width: 430px; /* Ширина близкая к реальной ширине iPhone */
            margin: 0 auto;
            padding: env(safe-area-inset-top) 15px 40px 15px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.6;
        }

        /* Сетка галереи */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки на телефоне */
            gap: 10px;
        }

        .art-item {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1; /* Квадратные превью */
            cursor: pointer;
            transition: transform 0.2s;
        }

        .art-item:active {
            transform: scale(0.95);
        }

        .art-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Модальное окно (просмотр во весь экран) */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #modal img {
            max-width: 95%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close-modal {
            position: absolute;
            top: 40px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Art Portfolio</h1>
        <p>Твоё вдохновение в каждом пикселе</p>
    </header>

    <div class="gallery-grid">
        <!-- Добавь сюда пути к её рисункам -->
        <div class="art-item" onclick="openModal(this)">
            <img src="art1.jpg" alt="Работа 1">
        </div>
        <div class="art-item" onclick="openModal(this)">
            <img src="art2.jpg" alt="Работа 2">
        </div>
        <div class="art-item" onclick="openModal(this)">
            <img src="art3.jpg" alt="Работа 3">
        </div>
        <div class="art-item" onclick="openModal(this)">
            <img src="art4.jpg" alt="Работа 4">
        </div>
        <!-- Можно добавлять сколько угодно блоков ниже -->
    </div>

    <footer>
        Handcrafted for you | 2026
    </footer>
</div>

<!-- Окно просмотра -->
<div id="modal" onclick="this.style.display='none'">
    <span class="close-modal">&times;</span>
    <img id="modal-img" src="" alt="Full View">
</div>

<script>
    function openModal(element) {
        const fullImg = element.querySelector('img').src;
        document.getElementById('modal-img').src = fullImg;
        document.getElementById('modal').style.display = 'flex';
    }
</script>

</body>
</html>
